<div class="checkout-container">
  <h2>Checkout</h2>

  <div class="checkout-content">
    <div class="order-summary">
      <h3>Order Summary</h3>
      <div class="order-items">
        <div class="order-item" *ngFor="let item of cartItems">
          <div class="item-name">{{ item.productName }}</div>
          <div class="item-qty">x{{ item.quantity }}</div>
          <div class="item-price">₹{{ item.price * item.quantity }}</div>
        </div>
      </div>

      <div class="order-total">
        <div class="total-row">
          <span>Subtotal:</span>
          <span>₹{{ getTotal() }}</span>
        </div>
        <div class="total-row">
          <span>Shipping:</span>
          <span>Free</span>
        </div>
        <div class="total-amount">
          <span>Total:</span>
          <span>₹{{ getTotal() }}</span>
        </div>
      </div>
    </div>

    <div class="checkout-form">
      <h3>Delivery & Payment</h3>

      <form>
        <div class="form-group">
          <label>Shipping Address: *</label>
          <textarea 
            [(ngModel)]="shippingAddress"
            name="address"
            rows="4"
            placeholder="Enter your complete shipping address"
            class="textarea"
          ></textarea>
        </div>

        <div class="form-group">
          <label>Payment Method: *</label>
          <select [(ngModel)]="paymentMethod" name="paymentMethod">
            <option *ngFor="let method of paymentMethods" [value]="method.value">
              {{ method.label }}
            </option>
          </select>
        </div>

        <div class="form-group">
          <label>Special Notes (Optional):</label>
          <textarea 
            [(ngModel)]="notes"
            name="notes"
            rows="3"
            placeholder="Any special instructions for the seller..."
            class="textarea"
          ></textarea>
        </div>

        <ng-container *ngIf="errorMessage">
          <div class="error-message">{{ errorMessage }}</div>
        </ng-container>

        <ng-container *ngIf="successMessage">
          <div class="success-message">{{ successMessage }}</div>
        </ng-container>

        <div class="form-actions">
          <button type="button" (click)="goBack()" class="btn btn-outline">Back to Cart</button>
          <button 
            type="button"
            (click)="placeOrder()"
            [disabled]="loading"
            class="btn btn-primary btn-large"
          >
            {{ loading ? 'Placing Order...' : 'Place Order' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
