<div class="cart-container">
  <h2>Shopping Cart</h2>

  <ng-container *ngIf="cartItems.length === 0">
    <div class="empty-cart">
      <p>Your cart is empty</p>
      <a routerLink="/products" class="btn btn-primary">Continue Shopping</a>
    </div>
  </ng-container>

  <ng-container *ngIf="cartItems.length > 0">
    <div class="cart-content">
      <table class="cart-table">
        <thead>
          <tr>
            <th>Product</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Subtotal</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let item of cartItems">
            <td>{{ item.productName }}</td>
            <td>₹{{ item.price }}</td>
            <td>
              <input 
                type="number" 
                [value]="item.quantity"
                (change)="updateQuantity(item.productId, $any($event.target).value)"
                min="1"
                class="qty-input"
              >
            </td>
            <td>₹{{ item.price * item.quantity }}</td>
            <td>
              <button (click)="removeItem(item.productId)" class="btn btn-danger">Remove</button>
            </td>
          </tr>
        </tbody>
      </table>

      <div class="cart-summary">
        <div class="summary-item">
          <span>Subtotal:</span>
          <span>₹{{ getTotal() }}</span>
        </div>
        <div class="summary-item">
          <span>Shipping:</span>
          <span>Free</span>
        </div>
        <div class="summary-total">
          <span>Total:</span>
          <span>₹{{ getTotal() }}</span>
        </div>
      </div>

      <div class="cart-actions">
        <button (click)="clearCart()" class="btn btn-outline">Clear Cart</button>
        <a routerLink="/checkout" class="btn btn-primary">Proceed to Checkout</a>
      </div>
    </div>
  </ng-container>
</div>
