version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:6.0
    container_name: pharma-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: pharma-marketplace
    volumes:
      - mongo_data:/data/db
    networks:
      - pharma-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pharma-backend
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:password123@mongo:27017/pharma-marketplace?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      PORT: 5000
      NODE_ENV: development
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - pharma-network
    command: npm run dev

  # Frontend Angular App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pharma-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pharma-network

volumes:
  mongo_data:

networks:
  pharma-network:
    driver: bridge
